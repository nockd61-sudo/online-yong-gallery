<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>YONGRYEON Admin</title><link rel="stylesheet" href="style.css"/></head>
<body class="admin-page">
  <section id="login" class="admin-box">
    <h1>YONGRYEON Admin</h1>
    <input id="user" placeholder="아이디" />
    <input id="pass" type="password" placeholder="비밀번호" />
    <button id="loginBtn">로그인</button>
    <p id="loginMsg"></p>
  </section>
  <section id="admin" class="admin-wrap hidden">
    <header class="topbar"><div class="brand">YONGRYEON Admin</div><button id="logoutBtn">로그아웃</button></header>
    <form id="form" class="form">
      <input type="hidden" id="id" />
      <input id="title" placeholder="작품명 *" required />
      <input id="year" placeholder="제작연도" />
      <input id="material" placeholder="재료" />
      <input id="size" placeholder="크기" />
      <textarea id="description" placeholder="작품 설명(선택)"></textarea>
      <label>대표 이미지 <input id="image" type="file" accept="image/*" /></label>
      <label>GLB 파일 <input id="model" type="file" accept=".glb,model/gltf-binary" /></label>
      <input id="sort_order" type="number" placeholder="전시 순서" value="0" />
      <label class="check"><input id="is_public" type="checkbox" checked /> 공개</label>
      <button type="submit">저장</button>
      <button type="button" id="resetBtn">새 작품</button>
      <p id="msg"></p>
    </form>
    <div id="list" class="admin-list"></div>
  </section>
  <script src="config.js"></script><script src="admin.js"></script>
</body>
</html>
