<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>YONGRYEON Admin</title><link rel="stylesheet" href="css/style.css"><script type="module" src="js/admin.js"></script></head><body class="admin"><main class="admin-shell"><section id="loginBox" class="panel"><h1>YONGRYEON ADMIN</h1><p>관리자만 작품을 등록합니다.</p><input id="user" placeholder="관리자 아이디" autocomplete="username"><input id="pass" placeholder="비밀번호" type="password" autocomplete="current-password"><button id="loginBtn">로그인</button><p id="loginMsg" class="msg"></p></section><section id="adminBox" class="panel" hidden><div class="admin-head"><h1>작품 관리</h1><button id="logoutBtn" class="ghost">로그아웃</button></div><form id="artForm" class="form"><input name="title" placeholder="작품명" required><input name="year" placeholder="제작연도"><input name="material" placeholder="재료"><input name="size" placeholder="크기"><textarea name="description" placeholder="작품 설명(선택)"></textarea><label>대표 이미지<input name="image" type="file" accept="image/*"></label><label>3D GLB 파일<input name="model" type="file" accept=".glb,model/gltf-binary"></label><label class="check"><input name="is_public" type="checkbox" checked> 공개</label><input name="sort_order" type="number" placeholder="전시 순서" value="0"><button>작품 저장</button><p id="saveMsg" class="msg"></p></form><hr><div id="adminList" class="admin-list"></div></section></main></body></html>
