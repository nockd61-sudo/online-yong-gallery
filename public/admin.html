<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | YONGRYEON</title><link rel="stylesheet" href="style.css"></head><body class="admin"><main class="admin-wrap"><h1>YONGRYEON ADMIN</h1><section id="loginBox" class="panel"><input id="user" placeholder="관리자 ID"><input id="pass" type="password" placeholder="비밀번호"><button id="loginBtn">로그인</button><p id="loginMsg"></p></section><section id="adminBox" class="hidden"><div class="panel"><h2>작품 등록</h2><form id="artForm"><input name="title" placeholder="작품명" required><input name="year" placeholder="제작연도"><input name="material" placeholder="재료"><input name="size" placeholder="크기"><textarea name="description" placeholder="작품 설명(선택)"></textarea><label>대표 이미지 <input name="image" type="file" accept="image/*"></label><label>GLB 파일 <input name="model" type="file" accept=".glb,model/gltf-binary"></label><label><input name="is_public" type="checkbox" checked> 공개</label><button>저장</button><p id="saveMsg"></p></form></div><div class="panel"><h2>작품 목록</h2><div id="list"></div></div></section></main><script src="config.js"></script><script src="admin.js"></script></body></html>
