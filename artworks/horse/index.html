<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>yongryeonkim 3D Online Museum</title>
  <meta name="description" content="세웅 작가의 3D 작품 감상 페이지입니다." />

  <meta property="og:title" content="세웅 3D 온라인 미술관 작품" />
  <meta property="og:description" content="세웅 작가의 조각 작품을 회전하고 확대하며 3D로 감상해보세요." />
  <meta property="og:image" content="https://nockd61-sudo.github.io/online-yong-gallery/images/museum-cover.jpg" />
  <meta property="og:type" content="article" />

  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <header class="art-detail-header">
    <a href="../../" class="back-link">← 전시장으로 돌아가기</a>
    <p id="artRoom" class="eyebrow">ROOM</p>
    <h1 id="artTitle">작품명</h1>
    <p id="artMeta">작품 정보</p>
  </header>

  <main class="art-detail-layout">
    <section class="viewer-section">
      <div class="viewer-toolbar">
        <button id="load3d">3D 작품 불러오기</button>
        <button id="fullscreenBtn">전체화면</button>
        <button id="resetViewBtn">시점 초기화</button>
      </div>

      <div class="viewer-box">
        <div id="viewer">
          <div class="viewer-start">
            <h2 id="viewerTitle">작품명</h2>
            <p>버튼을 누르면 3D 작품이 로딩됩니다.</p>
          </div>
        </div>
      </div>

      <p class="viewer-help">
        마우스 드래그: 회전 / 휠: 확대·축소 / 모바일: 손가락으로 회전·확대
      </p>
    </section>

    <aside class="art-info-panel">
      <p id="artNumber" class="art-number">작품 번호</p>
      <h2 id="panelTitle">작품명</h2>
      <p id="panelMeta" class="meta">작품 정보</p>

      <h3>작품 설명</h3>
      <p id="artDescription"></p>

      <h3>AI 도슨트</h3>
      <p id="docentText"></p>

      <div class="docent-buttons">
        <button onclick="speakDocent()">도슨트 듣기</button>
        <button onclick="stopDocent()">정지</button>
      </div>

      <div class="share-buttons">
        <button onclick="sharePage()">SNS 공유하기</button>
        <button onclick="copyLink()">링크 복사</button>
      </div>
    </aside>
  </main>

  <script type="module" src="../../js/viewer.js"></script>
</body>
</html>
