<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YONGRYEON Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body class="viewer-body">
  <a class="viewer-back" href="./#works">← Works</a>
  <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="0.7" exposure="1" style="width:100vw;height:100vh;background:#050505"></model-viewer>
  <script>
    const p = new URLSearchParams(location.search);
    const src = p.get('model');
    if (src) document.getElementById('mv').src = src;
  </script>
</body>
</html>
