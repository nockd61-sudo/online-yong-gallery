name = "yongryeon-api"
main = "src/index.js"
compatibility_date = "2026-07-06"

[[d1_databases]]
binding = "DB"
database_name = "yongryeon-db"
database_id = "PUT_D1_DATABASE_ID_HERE"

[[r2_buckets]]
binding = "R2"
bucket_name = "yongryeon-assets"

[vars]
PUBLIC_R2_BASE = "https://YOUR-R2-PUBLIC-DOMAIN"
ADMIN_USER = "admin"
# ADMIN_PASS, JWT_SECRET은 Cloudflare 대시보드에서 Secret으로 넣는 것을 권장합니다.
