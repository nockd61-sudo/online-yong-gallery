<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YONGRYEON | Digital Sculpture</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top">YONGRYEON</a>
    <nav>
      <a href="#works">Works</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="eyebrow">DIGITAL SCULPTURE</p>
      <h1>YONGRYEON</h1>
      <a class="enter" href="#works">Enter</a>
    </section>

    <section id="works" class="section works-section">
      <h2>작품 전시장</h2>
      <div id="worksGrid" class="works-grid"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-frame"></div>
        <h3>등록된 작품을 기다리고 있습니다.</h3>
        <p>샘플 작품은 넣지 않았습니다. 관리자 등록 작품만 이곳에 표시됩니다.</p>
      </div>
    </section>

    <section id="about" class="section text-section">
      <p class="section-label">ABOUT</p>
      <h2>YONGRYEON</h2>
      <p>YONGRYEON은 조각 작품을 조용하고 집중도 높은 방식으로 보여주는 온라인 전시장입니다.</p>
    </section>

    <section id="contact" class="section text-section">
      <p class="section-label">CONTACT</p>
      <h2>Contact</h2>
      <p>작품 문의는 작가에게 직접 연락해 주세요.</p>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
