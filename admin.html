<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YONGRYEON Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-card" id="loginPanel">
      <p class="section-label">ADMIN</p>
      <h1>관리자 로그인</h1>
      <input id="username" placeholder="관리자 아이디" autocomplete="username" />
      <input id="password" placeholder="비밀번호" type="password" autocomplete="current-password" />
      <button id="loginBtn">로그인</button>
      <p id="loginMsg" class="admin-msg"></p>
    </section>
    <section class="admin-card hidden" id="dashboardPanel">
      <div class="admin-top"><h1>YONGRYEON 관리자</h1><button id="logoutBtn" class="ghost">로그아웃</button></div>
      <p>로그인 성공. 다음 단계에서 작품 등록 기능을 연결합니다.</p>
      <div class="admin-next">
        <strong>다음 단계</strong><br />작품명, 연도, 재료, 대표 이미지, GLB 업로드 폼 추가
      </div>
    </section>
  </main>
  <script src="js/admin.js"></script>
</body>
</html>
