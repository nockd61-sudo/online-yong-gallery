<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YONGRYEON Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section id="loginPanel" class="admin-card">
      <p class="eyebrow">PRIVATE ADMIN</p>
      <h1>YONGRYEON 관리자</h1>
      <form id="loginForm" class="admin-form">
        <label>아이디
          <input id="adminId" type="text" autocomplete="username" required />
        </label>
        <label>비밀번호
          <input id="adminPw" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">로그인</button>
      </form>
      <p id="loginMessage" class="admin-message"></p>
      <p class="admin-note">임시 로그인: admin / yongryeon2026</p>
    </section>

    <section id="dashboardPanel" class="admin-card hidden">
      <div class="admin-topline">
        <div>
          <p class="eyebrow">DASHBOARD</p>
          <h1>관리자 대시보드</h1>
        </div>
        <button id="logoutBtn" class="ghost-btn">로그아웃</button>
      </div>
      <div class="next-box">
        <strong>로그인 성공</strong>
        <p>다음 단계에서 작품 등록 폼을 연결합니다.</p>
        <p>작품명, 연도, 재료, 대표 이미지, GLB 업로드 기능을 추가합니다.</p>
      </div>
      <a class="back-link" href="index.html">전시장 보기</a>
    </section>
  </main>
  <script src="js/admin.js"></script>
</body>
</html>
